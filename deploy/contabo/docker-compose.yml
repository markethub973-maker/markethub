services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - N8N_HOST=n8n.markethubpromo.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - WEBHOOK_URL=https://n8n.markethubpromo.com/
      - N8N_BASIC_AUTH_ACTIVE=true
      - GENERIC_TIMEZONE=Europe/Bucharest
      - TZ=Europe/Bucharest
      - N8N_SECURE_COOKIE=true
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web

volumes:
  n8n_data:
  caddy_data:
  caddy_config:

networks:
  web:
