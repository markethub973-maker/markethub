name: Infrastructure Monitor (hourly)
on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: {}

jobs:
  monitor:
    if: false  # 🛑 KILL SWITCH — paused until social media is functional
    runs-on: ubuntu-latest
    steps:
      - name: Check infrastructure capacity
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MarketHubCron/1.0" \
            "https://markethubpromo.com/api/cron/infra-monitor" \
            --max-time 25 || true
