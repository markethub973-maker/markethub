name: Automation Runs Cleanup (every 15 min)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: automation-cleanup
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Cleanup stuck runs
        run: |
          curl --silent --show-error --fail-with-body \
            --max-time 45 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: gha-automation-cleanup/1" \
            https://markethubpromo.com/api/cron/automation-runs-cleanup
