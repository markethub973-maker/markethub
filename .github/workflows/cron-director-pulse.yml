name: Director Pulse (hourly)
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  # 🛑 KILL SWITCH — all Alex operations paused until social media is functional
  pulse:
    if: false  # 🛑 KILL SWITCH — paused until social media is functional
    runs-on: ubuntu-latest
    steps:
      - name: Log director activities
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: MarketHubCron/1.0" \
            "https://markethubpromo.com/api/cron/director-pulse" \
            --max-time 25 || true
