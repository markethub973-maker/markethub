name: Cron — Sofia AlexLoom daily batch (daily 08:00 UTC)

# Sofia picks top N untouched high-score prospects and fires AlexLoom
# avatar pitches. Finished videos push to Eduard's Telegram via the
# avatar-poll cron within 2-5 min.
# Auth: BRAIN_CRON_SECRET (repo secret).

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: cron-alex-loom-batch
  cancel-in-progress: false

jobs:
  # 🛑 KILL SWITCH — all Alex operations paused until social media is functional
  run:
    if: false  # 🛑 KILL SWITCH — paused until social media is functional
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sofia batch
        run: |
          curl --silent --show-error --fail-with-body \
            --max-time 120 \
            -H "x-brain-cron-secret: ${{ secrets.BRAIN_CRON_SECRET }}" \
            -H "User-Agent: gha-cron/1 (alex-loom-batch)" \
            "https://viralstat-dashboard.vercel.app/api/brain/alex-loom-batch?limit=3&language=ro"
