# MarketHub N8N Automation Stack — M10 Sprint 1
#
# Deploy on Hetzner CX21 (2 vCPU / 4GB RAM / €5.50 mo).
# Subdomain: automations.markethubpromo.com (DNS → server IP).
# TLS: Caddy auto Let's Encrypt.
#
# Usage:
#   1. Copy .env.n8n.example → .env and fill in secrets
#   2. docker compose up -d
#   3. Visit https://automations.markethubpromo.com (basic auth first, then OAuth)
#
# Data persists in named volumes. Back up daily via `infra/n8n/backup.sh`.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${N8N_DB_USER}
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - n8n_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${N8N_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1
    volumes:
      - n8n_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Core
      N8N_HOST: automations.markethubpromo.com
      N8N_PROTOCOL: https
      N8N_PORT: 5678
      WEBHOOK_URL: https://automations.markethubpromo.com/
      N8N_EDITOR_BASE_URL: https://automations.markethubpromo.com/
      GENERIC_TIMEZONE: Europe/Bucharest
      TZ: Europe/Bucharest
      # DB
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      # Queue via Redis (so long-running workflows don't block UI)
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Security
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      # Telemetry off — we don't phone home
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      # Webhook HMAC verification — shared with MarketHub app
      MARKETHUB_WEBHOOK_SECRET: ${MARKETHUB_WEBHOOK_SECRET}
      # So webhooks issued from app use correct base
      MARKETHUB_API_BASE: https://markethubpromo.com
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows:ro

  # Worker — scales out long-running workflows
  n8n-worker:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_started
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: Europe/Bucharest
      TZ: Europe/Bucharest

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - n8n

volumes:
  n8n_pgdata:
  n8n_redis:
  n8n_data:
  caddy_data:
  caddy_config:
